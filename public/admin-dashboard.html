<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — DEVSEAS Global</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: #f8fafc;
            color: #334155;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 0;
        }

        .dashboard-header {
            background-color: #0f172a;
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .btn-logout {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-logout:hover {
            background: #dc2626;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            text-align: left;
            padding: 12px 16px;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background-color: #f1f5f9;
            font-weight: 600;
        }

        tr:hover {
            background-color: #f8fafc;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
    </style>
</head>

<body>

    <div class="dashboard-header">
        <h2><i class="fas fa-shield-halved"></i> Admin Dashboard</h2>
        <div>
            <span id="welcomeMsg" style="margin-right: 20px;"></span>
            <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>

    <div class="dashboard-container">
        <div class="card">
            <h3>Recent Form Submissions (Inquiries)</h3>
            <div id="contentArea">
                <div class="loading"><i class="fas fa-spinner fa-spin fa-2x"></i><br><br>Loading data...</div>
            </div>
        </div>
    </div>

    <script>
        // Check for token
        const token = localStorage.getItem('adminToken');
        const userStr = localStorage.getItem('adminUser');

        if (!token) {
            window.location.href = '/admin/login';
        }

        if (userStr) {
            const user = JSON.parse(userStr);
            document.getElementById('welcomeMsg').textContent = `Welcome, ${user.name}`;
        }

        function logout() {
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminUser');
            window.location.href = '/admin/login';
        }

        async function fetchInquiries() {
            try {
                const res = await fetch('/api/inquiries', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (res.status === 401 || res.status === 403) {
                    logout();
                    return;
                }

                const data = await res.json();

                if (data.length === 0) {
                    document.getElementById('contentArea').innerHTML = '<p style="padding: 20px 0; color: #64748b;">No inquiries found in the database.</p>';
                    return;
                }

                let html = `
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Message</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                data.forEach(item => {
                    const date = new Date(item.createdAt).toLocaleDateString();
                    html += `
                        <tr>
                            <td>${date}</td>
                            <td>${item.name || '-'}</td>
                            <td>${item.email || '-'}</td>
                            <td>${item.phone || '-'}</td>
                            <td>${item.message || '-'}</td>
                        </tr>
                    `;
                });

                html += '</tbody></table>';
                document.getElementById('contentArea').innerHTML = html;

            } catch (err) {
                console.error(err);
                document.getElementById('contentArea').innerHTML = '<p style="color: red;">Error loading data.</p>';
            }
        }

        // Load data
        fetchInquiries();
    </script>
</body>

</html>
